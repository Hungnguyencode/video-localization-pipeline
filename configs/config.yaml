project:
  name: "video-localization-pipeline"
  version: "0.2.0-fpt-gemini"

paths:
  input_dir: "data/input"
  audio_dir: "data/audio"
  transcripts_dir: "data/transcripts"
  subtitles_dir: "data/subtitles"
  tts_segments_dir: "data/tts_segments"
  output_dir: "data/output"

audio:
  sample_rate: 16000
  channels: 1

asr:
  provider: "faster_whisper"
  model_name: "small"
  device: "auto"
  compute_type: "int8_float16"
  language: "auto"
  fallback_to_cpu: true

translation:
  provider: "gemini"
  source_language: "en"
  target_language: "vi"
  model_name: "Helsinki-NLP/opus-mt-en-vi"
  sleep_seconds: 0.15

  gemini:
    api_key_env: "GEMINI_API_KEY"
    model_name: "gemini-2.5-flash"
    temperature: 0.2
    max_output_tokens: 8192
    batch_size: 12
    max_batch_chars: 6000
    request_sleep_seconds: 0.15
    max_retries: 4
    retry_base_seconds: 2.0
    cache_enabled: true
    cache_path: "data/cache/gemini_translation_cache_v2.json"
    fallback_provider: "google_free"
    content_domain: "general"
    pronoun_style: "auto"

  merge_segments:
    enabled: true
    max_duration_sec: 16.0
    max_chars: 360

  postprocess:
    enabled: true
    style: "natural_spoken"
    shorten_for_tts: false
    max_chars_per_second: 17.0
    glossary_files:
      - "configs/glossaries/common_vi.yaml"
    replacements: []

tts:
  provider: "fpt_ai"
  voice: "fpt:banmai"
  rate: "+15%"
  volume: "+0%"

alignment:
  max_speedup: 1.45
  trim_if_too_long: false
  silence_padding_ms: 80
  min_gap_ms: 60

render:
  audio_mode: "replace"
  burn_subtitle: false
  original_audio_volume_db: -18
  subtitle_max_chars_per_line: 42
  output_video_suffix: "_vi_dubbed"
